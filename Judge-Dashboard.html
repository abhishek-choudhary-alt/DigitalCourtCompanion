<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Judge Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins', sans-serif;
background:#f8fafc;
color:#0f172a;
}

/* HEADER */

.main-header{
width:100%;
background:#13294b;
border-bottom:2px solid rgba(255,255,255,0.2);
}

.navbar{
width:100%;
max-width:1400px;
margin:auto;
display:flex;
justify-content:space-between;
align-items:center;
padding:11px 40px;
}

.nav-left{
display:flex;
align-items:center;
gap:18px;
color:white;
font-size:22px;
font-weight:600;
}

.nav-left img{
width:60px;
height:60px;
object-fit:cover;
border-radius:10px;
}

.nav-center{
list-style:none;
display:flex;
gap:60px;
}

.nav-center li a{
position:relative;
text-decoration:none;
color:#e5e7eb;
font-size:14px;
font-weight:400;
padding-bottom:5px;
transition:0.3s ease;
}

.nav-center li a::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:100%;
height:3px;
background:#facc15;
transform:scaleX(0);
transform-origin:left;
transition:transform 0.3s ease;
}

.nav-center li a:hover{
color:white;
}

.nav-center li a:hover::after{
transform:scaleX(1);
}

.login-btn{
display:inline-block;
padding:10px 28px;
background:transparent;
border:2px solid #facc15;
color:#facc15;
font-size:14px;
font-weight:500;
border-radius:8px;
cursor:pointer;
transition:all 0.3s ease;
position:relative;
z-index:5;
}

.login-btn:hover{
background:#facc15;
color:#13294b;
transform:translateY(-2px);
box-shadow:0 6px 12px rgba(0,0,0,0.2);
}
/* PAGE */

.page{
max-width:1300px;
margin:auto;
padding:40px;
}

.page-title{
font-size:32px;
margin-bottom:20px;
}

/* SEARCH */

.search-bar{
display:flex;
gap:12px;
margin-bottom:30px;
}

.search-bar input{
padding:8px 12px;
border-radius:8px;
border:1px solid #cbd5e1;
width:260px;
}

.search-bar button{
padding:8px 14px;
background:#13294b;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* CASE GRID */

.case-grid{
display:grid;
grid-template-columns:repeat(auto-fill,300px);
gap:22px;
}

.case-card{
background:white;
padding:18px;
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.case-title{
font-weight:600;
margin-bottom:10px;
}

.case-info{
font-size:13px;
line-height:1.6;
color:#475569;
margin-bottom:10px;
}

/* ACTION */

.action-section{
border-top:1px solid #e2e8f0;
padding-top:10px;
}

select{
width:160px;
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
}

input[type="date"]{
padding:6px;
border-radius:6px;
border:1px solid #cbd5e1;
}

textarea{
width:100%;
border:1px solid #cbd5e1;
border-radius:6px;
margin-top:6px;
padding:6px;
resize:none;
}

.submit-btn{
margin-top:8px;
background:#13294b;
color:white;
border:none;
padding:7px 10px;
border-radius:6px;
cursor:pointer;
font-size:13px;
}

/* SUCCESS */

.success-popup{
position:fixed;
top:20px;
right:20px;
background:#16a34a;
color:white;
padding:10px 18px;
border-radius:8px;
opacity:0;
transition:0.3s;
}

.success-popup.show{
opacity:1;
}

/* NOTEPAD */

.notes-wrapper{
margin-top:60px;
}

.notepad{
background:white;
padding:15px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

.toolbar{
display:flex;
gap:6px;
margin-bottom:8px;
}

.toolbar button{
border:none;
padding:5px 10px;
border-radius:6px;
background:#eef2f7;
cursor:pointer;
}

.editor-container{
position:relative;
border:1px solid #cbd5e1;
border-radius:8px;
overflow:hidden;
}

#textEditor{
min-height:120px;
padding:10px;
outline:none;
font-size:14px;
}

#drawCanvas{
position:absolute;
top:0;
left:0;
}


</style>
</head>

<body>

<header class="main-header">
<nav class="navbar">

<div class="nav-left">
<img src="Images/tingey-injury-law-firm-DZpc4UY8ZtY-unsplash.jpg">
Digital Court Companion
</div>

<ul class="nav-center">
<li><a href="index.html">Home</a></li>
<li><a href="About-Us.html">About Us</a></li>
<li><a href="Our-Services.html">Services</a></li>
<li><a href="Contact-Us.html">Contact Us</a></li>
</ul>

<button id="loginbtn" class="login-btn">Login</button>

</nav>
</header>

<div class="page">

<h1 class="page-title">Judge Dashboard</h1>

<div class="search-bar">
<input id="searchInput" placeholder="Search case / petitioner">
<button onclick="searchCase()">Search</button>
</div>

<div class="case-grid" id="caseGrid"></div>

<div class="notes-wrapper">

<h2 style="margin-bottom:12px">Personal Notepad</h2>

<div class="notepad">

<div class="toolbar">
<button onclick="enableText()">Text</button>
<button onclick="enableDraw()">Draw</button>
<button onclick="enableEraser()">Erase</button>
<button onclick="clearCanvas()">Clear</button>
<button onclick="exportPDF()">Export</button>
</div>

<div class="editor-container">
<div id="textEditor" contenteditable="true"></div>
<canvas id="drawCanvas"></canvas>
</div>

</div>
</div>

</div>

<div class="success-popup" id="successPopup">
Action Completed
</div>

<script>

let cases=[

{
id:1,
caseNo:"C-1023",
courtNo:"12",
date:"2026-03-10",
time:"10:30 AM",
petitioner:"Rajesh Kumar",
petitionerLawyer:"Adv. Mehta",
defendant:"State of India",
defendantLawyer:"Adv. Sharma",
lastDate:"2026-02-18"
},

{
id:2,
caseNo:"C-1198",
courtNo:"4",
date:"2026-03-12",
time:"12:00 PM",
petitioner:"Anita Sharma",
petitionerLawyer:"Adv. Sinha",
defendant:"Rakesh",
defendantLawyer:"Adv. Verma",
lastDate:"2026-02-20"
}

];

function renderCases(list){

const grid=document.getElementById("caseGrid");
grid.innerHTML="";

list.forEach(c=>{

grid.innerHTML+=`

<div class="case-card">

<div class="case-title">
Case No: ${c.caseNo}
</div>

<div class="case-info">

Court No: ${c.courtNo}<br>
Date: ${c.date}<br>
Time: ${c.time}<br>

Petitioner: ${c.petitioner}<br>
Petitioner Lawyer: ${c.petitionerLawyer}<br>

Defendant: ${c.defendant}<br>
Defendant Lawyer: ${c.defendantLawyer}<br>

Last Date: ${c.lastDate}

</div>

<div class="action-section">

<select onchange="handleDecision(${c.id},this.value)">
<option value="">Judge Decision</option>
<option value="next">Issue Next Date</option>
<option value="close">Final Judgement</option>
</select>

<div id="next-${c.id}" style="display:none;margin-top:6px">
<input type="date" id="date-${c.id}">
<button class="submit-btn" onclick="submitNextDate(${c.id})">Submit</button>
</div>

<div id="judgement-${c.id}" style="display:none">
<textarea id="text-${c.id}" rows="3"></textarea>
<button class="submit-btn" onclick="submitJudgement(${c.id})">Submit</button>
</div>

</div>

</div>
`;

});

}

renderCases(cases);

function searchCase(){

const q=document.getElementById("searchInput").value.toLowerCase();

const filtered=cases.filter(c=>
c.caseNo.toLowerCase().includes(q) ||
c.petitioner.toLowerCase().includes(q)
);

renderCases(filtered);

}

function handleDecision(id,val){

document.getElementById(`next-${id}`).style.display="none";
document.getElementById(`judgement-${id}`).style.display="none";

if(val==="next"){
document.getElementById(`next-${id}`).style.display="block";
}

if(val==="close"){
document.getElementById(`judgement-${id}`).style.display="block";
}

}

async function submitNextDate(id){
showSuccess();
}

async function submitJudgement(id){
showSuccess();
}

function showSuccess(){

const p=document.getElementById("successPopup");

p.classList.add("show");

setTimeout(()=>{
p.classList.remove("show");
},2000);

}

const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
const editor=document.getElementById("textEditor");

let drawing=false;

function resizeCanvas(){
canvas.width=editor.offsetWidth;
canvas.height=editor.offsetHeight;
}

resizeCanvas();

canvas.style.pointerEvents="none";

function enableText(){
canvas.style.pointerEvents="none";
}

function enableDraw(){
canvas.style.pointerEvents="auto";
ctx.globalCompositeOperation="source-over";
}

function enableEraser(){
canvas.style.pointerEvents="auto";
ctx.globalCompositeOperation="destination-out";
}

canvas.addEventListener("mousedown",()=>drawing=true);

canvas.addEventListener("mouseup",()=>{
drawing=false;
ctx.beginPath();
});

canvas.addEventListener("mousemove",draw);

function draw(e){

if(!drawing) return;

const rect=canvas.getBoundingClientRect();

const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

ctx.lineWidth=3;
ctx.lineCap="round";

ctx.lineTo(x,y);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(x,y);

}

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function exportPDF(){

const {jsPDF}=window.jspdf;

const doc=new jsPDF();

doc.text(editor.innerText||"",10,10);

const imgData=canvas.toDataURL("image/png");

doc.addImage(imgData,"PNG",10,40,180,80);

doc.save("notes.pdf");

}

</script>

</body>
</html>

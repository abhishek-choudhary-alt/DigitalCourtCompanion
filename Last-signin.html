<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins', sans-serif;
  background:#f8fafc;
  color:#0f172a;
}

section{
  padding:120px 10%;
}

h1,h2,h3{
  font-weight:700;
}

        
        /* ================= PREMIUM HEADER ================= */

.main-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:1000;
  background:rgba(6,20,45,0.95);
  backdrop-filter: blur(10px);
  transition:transform 0.4s ease, box-shadow 0.4s ease;
}

/* Hidden state */
.main-header.hide{
  transform:translateY(-100%);
}

/* Shadow when scrolling */
.main-header.scrolled{
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 10%;
}

/* ===== LEFT (LOGO + BRAND) ===== */

.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
  cursor:pointer;
}

.nav-left img{
  width:55px;
  height:55px;
  object-fit:cover;
  border-radius:8px;
  transition:transform 0.3s ease;
}

.nav-left:hover img{
  transform:rotate(-8deg) scale(1.1);
}

.company-name{
  font-size:21px;
  font-weight:700;
  color:#ffffff;
  letter-spacing:0.5px;
  white-space:nowrap;
}

/* ===== CENTER LINKS ===== */

.nav-center{
  list-style:none;
  display:flex;
  gap:45px;
}

.nav-center li a{
  text-decoration:none;
  color:#e2e8f0;
  font-size:15px;
  position:relative;
  transition:0.3s;
}

.nav-center li a::after{
  content:"";
  position:absolute;
  width:0%;
  height:2px;
  bottom:-6px;
  left:0;
  background:#d4af37;
  transition:0.4s ease;
}

.nav-center li a:hover::after{
  width:100%;
}

.nav-center li a:hover{
  color:#ffffff;
}

/* ===== LOGIN BUTTON ===== */

.login-btn{
  padding:8px 22px;
  background:transparent;
  border:1px solid #d4af37;
  color:#d4af37;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.3s ease;
  font-size:14px;
}

.login-btn:hover{
  background:#d4af37;
  color:#06142d;
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(212,175,55,0.4);
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){
  .nav-center{
    display:none;
  }
}
/* ================= SIGN IN PAGE ================= */

.auth-section{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding-top:120px; /* prevent header overlap */
  background:linear-gradient(
    135deg,
    #0f2b46,
    #163d5c,
    #1e4e72,
    #2a648a
  );
}

.auth-container{
  text-align:center;
  color:white;
}

.auth-container h1{
  font-size:48px;
  margin-bottom:10px;
}

.auth-container p{
  color:#cbd5e1;
  margin-bottom:40px;
}

.auth-container p span{
  color:#d4af37;
  font-weight:600;
  cursor:pointer;
}

.auth-card{
  width:420px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:40px 35px;
  box-shadow:0 25px 50px rgba(0,0,0,0.4);
}

/* Inputs */

.auth-card input{
  width:100%;
  padding:14px;
  margin-bottom:20px;
  border-radius:8px;
  border:none;
  outline:none;
  background:#e5e7eb;
  font-size:14px;
}

/* Remember + forgot */

.auth-options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  margin-bottom:25px;
  color:#e2e8f0;
}

.auth-options a{
  color:#d4af37;
  text-decoration:none;
}

/* Sign In Button */

.auth-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
  cursor:pointer;
  background:linear-gradient(90deg,#3b82f6,#2563eb);
  color:white;
  transition:0.3s ease;
}

.auth-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(37,99,235,0.5);
}

/* Divider */

.divider{
  margin:30px 0;
  display:flex;
  align-items:center;
  color:#cbd5e1;
  font-size:14px;
}

.divider::before,
.divider::after{
  content:"";
  flex:1;
  height:1px;
  background:#94a3b8;
  margin:0 10px;
}

/* Google Button */

.google-btn{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  font-weight:500;
}

.google-btn img{
  width:18px;
}

/* Responsive */

@media(max-width:500px){
  .auth-card{
    width:90%;
  }
}



    </style>
</head>
<body>
    <header class="main-header">
  <nav class="navbar">

    <!-- Logo -->
    <div class="nav-left">
      <img src="Images/tingey-injury-law-firm-DZpc4UY8ZtY-unsplash.jpg" alt="Logo">
      <span class="company-name">Digital Court Companion</span>
    </div>

    <!-- Center Links -->
    <ul class="nav-center">
      <li><a href="#">Home</a></li>
      <li><a href="#">About Us</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Contact Us</a></li>
    </ul>

    <!-- Right Button -->
    <div class="nav-right">
      <button class="login-btn">Login</button>
    </div>

  </nav>
</header>




<script>
let lastScroll = 0;
const header = document.querySelector('.main-header');

window.addEventListener('scroll', () => {
    const currentScroll = window.pageYOffset;

    // Add shadow after small scroll
    if(currentScroll > 20){
        header.classList.add('scrolled');
    } else {
        header.classList.remove('scrolled');
    }

    // Hide on scroll down
    if(currentScroll > lastScroll && currentScroll > 100){
        header.classList.add('hide');
    } else {
        header.classList.remove('hide');
    }

    lastScroll = currentScroll;
});
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Case Details</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  background:#f8fafc;
  padding:60px;
}
.container{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:50px;
  border-radius:14px;
  box-shadow:0 6px 20px rgba(0,0,0,0.06);
}
h1{
  margin-bottom:10px;
}
.meta{
  color:#64748b;
  margin-bottom:30px;
}
.section{
  margin-top:30px;
}
.section h2{
  margin-bottom:10px;
  border-left:5px solid #facc15;
  padding-left:10px;
}
.section p{
  line-height:1.6;
  color:#334155;
}
textarea{
  width:100%;
  height:200px;
  margin-top:15px;
  padding:15px;
  border-radius:10px;
  border:1px solid #cbd5e1;
}
button{
  margin-top:15px;
  padding:10px 18px;
  background:#facc15;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
  <div id="caseContent"></div>

  <div class="section">
    <h2>Student Notes</h2>
    <textarea id="notesArea" placeholder="Write your notes here..."></textarea>
    <button onclick="exportPDF()">Export Notes as PDF</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* ================= FULL STRUCTURED DATA ================= */

const cases = [
{
id:1,
title:"State vs Ramesh",
court:"Supreme Court of India",
year:2019,
bench:"Justice A. Kumar, Justice B. Rao",
parties:"State (Petitioner) vs Ramesh (Respondent)",
acts:"Indian Penal Code, Section 302",
proceduralHistory:"Trial Court convicted. High Court upheld. Appeal filed in Supreme Court.",
facts:"The accused was charged with murder under Section 302 IPC following a dispute that escalated into violence.",
issues:"Whether the accused had intention to commit murder and whether evidence was sufficient.",
petitionerArguments:"The prosecution argued that eyewitness testimony and forensic evidence clearly established intent.",
respondentArguments:"The defense argued lack of intent and unreliable witnesses.",
reasoning:"The Court examined witness credibility, forensic evidence, and precedent cases before reaching conclusion.",
judgement:"The Supreme Court upheld conviction and dismissed appeal.",
ratio:"Intent was clearly established through consistent witness accounts.",
obiter:"Court emphasized importance of forensic corroboration in criminal trials.",
takeaways:"Clarifies standards of proof in murder convictions.",
citation:"(2019) 5 SCC 123"
},

{
id:2,
title:"Meera vs Arjun",
court:"Delhi High Court",
year:2020,
bench:"Justice P. Sharma",
parties:"Meera (Petitioner) vs Arjun (Respondent)",
acts:"Hindu Marriage Act, 1955",
proceduralHistory:"Family Court decision challenged in High Court.",
facts:"Custody dispute following divorce proceedings.",
issues:"Who should be granted custody considering child welfare.",
petitionerArguments:"Mother argued she provided stable environment.",
respondentArguments:"Father claimed better financial stability.",
reasoning:"Court prioritized emotional well-being over financial factors.",
judgement:"Custody granted to mother.",
ratio:"Child welfare principle is paramount.",
obiter:"Court encouraged shared parenting approach.",
takeaways:"Reinforces child welfare doctrine.",
citation:"2020 SCC OnLine Del 456"
}
];

/* ================= LOAD BY ID ================= */

const params = new URLSearchParams(window.location.search);
const caseId = parseInt(params.get("id"));
const selected = cases.find(c => c.id === caseId);

if(selected){
document.getElementById("caseContent").innerHTML = `
<h1>${selected.title}</h1>
<div class="meta">
${selected.court} | ${selected.year} <br>
<strong>Bench:</strong> ${selected.bench}<br>
<strong>Parties:</strong> ${selected.parties}<br>
<strong>Acts Involved:</strong> ${selected.acts}<br>
<strong>Citation:</strong> ${selected.citation}
</div>

<div class="section"><h2>Procedural History</h2><p>${selected.proceduralHistory}</p></div>
<div class="section"><h2>Facts of the Case</h2><p>${selected.facts}</p></div>
<div class="section"><h2>Issues Framed</h2><p>${selected.issues}</p></div>
<div class="section"><h2>Arguments by Petitioner</h2><p>${selected.petitionerArguments}</p></div>
<div class="section"><h2>Arguments by Respondent</h2><p>${selected.respondentArguments}</p></div>
<div class="section"><h2>Court Reasoning</h2><p>${selected.reasoning}</p></div>
<div class="section"><h2>Judgment</h2><p>${selected.judgement}</p></div>
<div class="section"><h2>Ratio Decidendi</h2><p>${selected.ratio}</p></div>
<div class="section"><h2>Obiter Dicta</h2><p>${selected.obiter}</p></div>
<div class="section"><h2>Key Takeaways</h2><p>${selected.takeaways}</p></div>
`;
}

/* ================= EXPORT NOTES ================= */

function exportPDF(){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text(document.getElementById("notesArea").value,10,10);
doc.save("CaseNotes.pdf");
}

</script>

</body>
</html>

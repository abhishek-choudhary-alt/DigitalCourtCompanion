<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Court Companion - Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#f8fafc;color:#0f172a;}

/* HEADER */
.main-header{width:100%;background:#13294b;border-bottom:2px solid rgba(255,255,255,0.2);}
.navbar{max-width:1400px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:11px 40px;}
.nav-left{display:flex;align-items:center;gap:18px;color:white;font-size:22px;font-weight:600;}
.nav-left img{width:60px;height:60px;border-radius:10px;}
.nav-center{list-style:none;display:flex;gap:60px;}
.nav-center li a{text-decoration:none;color:#e5e7eb;font-size:14px;position:relative;}
.nav-center li a::after{content:"";position:absolute;left:0;bottom:-4px;width:100%;height:3px;background:#facc15;transform:scaleX(0);transition:0.3s;}
.nav-center li a:hover::after{transform:scaleX(1);}
.login-btn{padding:10px 28px;background:transparent;border:2px solid #facc15;color:#facc15;border-radius:8px;cursor:pointer;}
.login-btn:hover{background:#facc15;color:#13294b;}

/* HERO */
.hero{padding:80px 100px;background:#eef2f7;}
.hero h1{font-size:44px;margin-bottom:20px;}
.hero p{font-size:18px;color:#475569;max-width:700px;}

/* GRID */
.container{padding:60px 100px;display:grid;grid-template-columns:1fr 1fr;gap:60px;}
.section-title{font-size:26px;margin-bottom:20px;}

/* FILTER */
.filter-bar{display:flex;gap:15px;margin-bottom:20px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{padding:10px;border-radius:8px;border:1px solid #cbd5e1;}
.filter-bar button{padding:10px 18px;background:#13294b;color:white;border:none;border-radius:8px;cursor:pointer;}

/* CARD */
.card{background:white;padding:25px;border-radius:14px;margin-bottom:20px;box-shadow:0 6px 18px rgba(0,0,0,0.05);transition:0.3s;}
.card:hover{transform:translateY(-4px);}
.card h3{margin-bottom:8px;}
.card p{color:#64748b;}
.view-btn{margin-top:12px;padding:8px 16px;background:#facc15;border:none;border-radius:8px;cursor:pointer;font-weight:600;}

/* NOTEPAD SECTION */
.notes-wrapper{padding:60px 100px;}

.notepad{
  background:white;
  border-radius:18px;
  box-shadow:0 10px 35px rgba(0,0,0,0.08);
  padding:25px;
}

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  align-items:center;
  background:#eef2f7;
  padding:12px;
  border-radius:14px;
  margin-bottom:15px;
}

.toolbar button{
  border:none;
  padding:8px 14px;
  border-radius:10px;
  cursor:pointer;
  font-weight:500;
  background:white;
  box-shadow:0 3px 6px rgba(0,0,0,0.08);
  transition:0.2s;
}

.toolbar button.active{
  background:#13294b;
  color:white;
}

.toolbar input[type="color"]{
  width:40px;height:40px;border:none;cursor:pointer;border-radius:8px;
}

.toolbar input[type="range"]{
  width:120px;
}

.editor-container{
  position:relative;
  border-radius:14px;
  overflow:hidden;
  border:1px solid #dbe3f0;
}

#textEditor{
  min-height:350px;
  padding:20px;
  outline:none;
  font-size:18px;
  line-height:1.6;
}

#drawCanvas{
  position:absolute;
  top:0;left:0;
}

.export-btn{
  background:#13294b !important;
  color:white;
}
</style>
</head>

<body>

<header class="main-header">
<nav class="navbar">
<div class="nav-left">
<img src="Images/tingey-injury-law-firm-DZpc4UY8ZtY-unsplash.jpg">
Digital Court Companion
</div>
<ul class="nav-center">
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>
<button class="login-btn">Login</button>
</nav>
</header>

<section class="hero">
<h1>Welcome Law Students!</h1>
<p>Your one-stop platform for exploring structured case studies and discovering verified internships across India’s judiciary ecosystem.</p>
</section>

<div class="container">

<!-- CASES -->
<div>
<h2 class="section-title">Case Studies</h2>

<div class="filter-bar">
<select id="caseTypeFilter">
<option value="all">All Types</option>
<option value="Criminal">Criminal</option>
<option value="Family">Family</option>
<option value="Corporate">Corporate</option>
</select>
<input type="text" id="caseSearch" placeholder="Search case name...">
<button onclick="applyCaseFilters()">Search</button>
</div>

<div id="caseList"></div>
</div>

<!-- INTERNSHIPS -->
<div>
<h2 class="section-title">Internships</h2>

<div class="filter-bar">
<select id="internLocationFilter">
<option value="all">All Locations</option>
<option value="Jaipur">Jaipur</option>
<option value="Delhi">Delhi</option>
<option value="Bangalore">Bangalore</option>
</select>

<select id="internAreaFilter">
<option value="all">All Areas</option>
<option value="Criminal">Criminal</option>
<option value="Family">Family</option>
<option value="Corporate">Corporate</option>
</select>

<button onclick="applyInternFilters()">Search</button>
</div>

<div id="internList"></div>
</div>

</div>

<!-- NOTEPAD -->
<div class="notes-wrapper">

<h2 class="section-title">Personal Notepad</h2>

<div class="notepad">

<div class="toolbar">
<button id="textModeBtn" onclick="enableText()">Text</button>
<button id="drawModeBtn" onclick="enableDraw()">Draw</button>
<button id="eraseModeBtn" onclick="enableEraser()">Eraser</button>

<label>Color</label>
<input type="color" id="colorPicker" value="#000000">

<label>Brush Size</label>
<input type="range" id="brushSize" min="1" max="20" value="3">

<label>Eraser Size</label>
<input type="range" id="eraserSize" min="5" max="50" value="20">

<button onclick="clearCanvas()">Clear</button>
<button class="export-btn" onclick="exportPDF()">Export as PDF</button>
</div>

<div class="editor-container">
<div id="textEditor" contenteditable="true"></div>
<canvas id="drawCanvas"></canvas>
</div>

</div>
</div>

<script>

/* DATA */
const cases=[
{id:1,title:"State vs Ramesh",type:"Criminal",court:"Supreme Court",year:2019},
{id:2,title:"Meera vs Arjun",type:"Family",court:"High Court",year:2020},
{id:3,title:"TechCorp vs Union",type:"Corporate",court:"Supreme Court",year:2022}
];

const internships=[
{id:1,name:"Manoj Kumar",area:"Criminal",location:"Jaipur"},
{id:2,name:"Priya Singh",area:"Family",location:"Delhi"},
{id:3,name:"Rahul Sharma",area:"Corporate",location:"Bangalore"}
];

/* RENDER */
function renderCases(data){
const container=document.getElementById("caseList");
container.innerHTML="";
data.forEach(c=>{
container.innerHTML+=`
<div class="card">
<h3>${c.title}</h3>
<p>${c.type} | ${c.court} | ${c.year}</p>
<button class="view-btn" onclick="openCase(${c.id})">View Full Case</button>
</div>`;
});
}

function renderInternships(data){
const container=document.getElementById("internList");
container.innerHTML="";
data.forEach(i=>{
container.innerHTML+=`
<div class="card">
<h3>${i.name}</h3>
<p>${i.area} Law | ${i.location}</p>
<button class="view-btn" onclick="openInternship(${i.id})">View Internship</button>
</div>`;
});
}

renderCases(cases);
renderInternships(internships);

/* FILTERS */
function applyCaseFilters(){
const type=document.getElementById("caseTypeFilter").value;
const search=document.getElementById("caseSearch").value.toLowerCase();
const filtered=cases.filter(c=>
(type==="all"||c.type===type)&&
c.title.toLowerCase().includes(search)
);
renderCases(filtered);
}

function applyInternFilters(){
const location=document.getElementById("internLocationFilter").value;
const area=document.getElementById("internAreaFilter").value;
const filtered=internships.filter(i=>
(location==="all"||i.location===location)&&
(area==="all"||i.area===area)
);
renderInternships(filtered);
}

/* REDIRECTS */
function openCase(id){window.location.href=`case-details.html?id=${id}`;}
function openInternship(id){window.location.href=`internship-details.html?id=${id}`;}

/* NOTEPAD LOGIC */
const canvas=document.getElementById("drawCanvas");
const ctx=canvas.getContext("2d");
const editor=document.getElementById("textEditor");

let drawing=false;
let mode="text";

function resizeCanvas(){
canvas.width=editor.offsetWidth;
canvas.height=editor.offsetHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);
canvas.style.pointerEvents="none";

function resetActive(){
document.querySelectorAll(".toolbar button").forEach(btn=>btn.classList.remove("active"));
}

function enableText(){
mode="text";
canvas.style.pointerEvents="none";
resetActive();
textModeBtn.classList.add("active");
}

function enableDraw(){
mode="draw";
canvas.style.pointerEvents="auto";
ctx.globalCompositeOperation="source-over";
resetActive();
drawModeBtn.classList.add("active");
}

function enableEraser(){
mode="erase";
canvas.style.pointerEvents="auto";
ctx.globalCompositeOperation="destination-out";
resetActive();
eraseModeBtn.classList.add("active");
}

enableText();

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>{drawing=false;ctx.beginPath();});
canvas.addEventListener("mousemove",draw);

function draw(e){
if(!drawing) return;
const rect=canvas.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;

if(mode==="draw"){
ctx.lineWidth=brushSize.value;
ctx.strokeStyle=colorPicker.value;
}else if(mode==="erase"){
ctx.lineWidth=eraserSize.value;
}

ctx.lineCap="round";
ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);
}

function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);}

async function exportPDF(){
const { jsPDF }=window.jspdf;
const doc=new jsPDF();
const text=editor.innerText||" ";
doc.setFontSize(12);
doc.text(doc.splitTextToSize(text,180),10,10);
const imgData=canvas.toDataURL("image/png");
doc.addImage(imgData,"PNG",10,80,180,100);
doc.save("Student_Notepad.pdf");
}

</script>

</body>
</html>
